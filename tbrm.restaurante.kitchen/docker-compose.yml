services:
  mysql-kitchen-db:
    image: mysql:8.0
    container_name: mysql-kitchen-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kitchen_db
    ports:
      - "3316:3306"
    volumes:
      - kitchen_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - restaurant-network

  kitchen-service:
    image: kitchen-service:latest
    container_name: kitchen-service
    restart: always
    depends_on:
      mysql-kitchen-db:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-kitchen-db:3306/kitchen_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

volumes:
  kitchen_db_data:

networks:
  restaurant-network:
    driver: bridge
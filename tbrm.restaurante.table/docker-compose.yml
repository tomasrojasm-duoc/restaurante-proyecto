services:
  mysql-table-db:
    image: mysql:8.0
    container_name: mysql-table-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: table_db
    ports:
      - "3308:3306"
    volumes:
      - table_db_data:/var/lib/mysql
    networks:
      - restaurant-network

  table-service:
    image: table-service:latest
    container_name: table-service
    restart: always
    depends_on:
      - mysql-table-db
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-table-db:3306/table_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

volumes:
  table_db_data:

networks:
  restaurant-network:
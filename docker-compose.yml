      context: ./tbrm.restaurante.auth
    image: auth-service:latest
    container_name: auth-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
    networks:
      - restaurant-network

  waiter-service:
    build:
      context: ./tbrm.restaurante.waiter
    image: waiter-service:latest
    container_name: waiter-service
    restart: always
    depends_on:
      mysql-waiter-db:

services:
  mysql-diner-db:
    image: mysql:8.0
    container_name: mysql-diner-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: diner_db
    ports:
      - "3309:3306"
    volumes:
      - diner_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - restaurant-network

  diner-service:
    image: diner-service:latest
    container_name: diner-service
    restart: always
    depends_on:
      mysql-diner-db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-diner-db:3306/diner_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

volumes:
  diner_db_data:

networks:
  restaurant-network:
    driver: bridge
  api-gateway:
    build:
      context: ./restaurante/restaurante
    image: api-gateway:latest
    container_name: api-gateway
    restart: always
    depends_on:
      diner-service:
        condition: service_started
      reservation-service:
        condition: service_started
      table-service:
        condition: service_started
      auth-service:
        condition: service_started
      waiter-service:
        condition: service_started
      menu-service:
        condition: service_started
      order-service:
        condition: service_started
      kitchen-service:
        condition: service_started
      inventory-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
    networks:
      - restaurant-network

volumes:
  diner_db_data:
  reservation_db_data:
  table_db_data:
  waiter_db_data:
  menu_db_data:
  order_db_data:
  kitchen_db_data:
  inventory_db_data:
  notification_db_data:

networks:
  restaurant-network:
    driver: bridge
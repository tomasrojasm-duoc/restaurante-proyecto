    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-waiter-db:3306/waiter_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

  menu-service:
    build:
      context: ./tbrm.restaurante.menu/tbrm.restaurante.menu
    image: menu-service:latest
    container_name: menu-service
    restart: always
    depends_on:
      mysql-menu-db:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-menu-db:3306/menu_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

  order-service:
    build:
      context: ./tbrm.restaurante.order/tbrm.restaurante.order
    image: order-service:latest
    container_name: order-service
    restart: always
    depends_on:
      mysql-order-db:
        condition: service_healthy
      diner-service:
        condition: service_started
      table-service:
        condition: service_started
      waiter-service:
        condition: service_started
      menu-service:
        condition: service_started
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-order-db:3306/order_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

  kitchen-service:
    build:
      context: ./tbrm.restaurante.kitchen
    image: kitchen-service:latest
    container_name: kitchen-service
    restart: always
    depends_on:
      mysql-kitchen-db:
        condition: service_healthy
      order-service:
        condition: service_started
    ports:
      - "8088:8088"
    environment:
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-kitchen-db:3306/kitchen_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

  inventory-service:
    build:
      context: ./tbrm.restaurante.inventory
    image: inventory-service:latest
    container_name: inventory-service
    restart: always
    depends_on:
      mysql-inventory-db:
        condition: service_healthy
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-inventory-db:3306/inventory_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:

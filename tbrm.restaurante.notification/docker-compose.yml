services:
  mysql-notification-db:
    image: mysql:8.0
    container_name: mysql-notification-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notification_db
    ports:
      - "3313:3306"
    volumes:
      - notification_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - restaurant-network

  notification-service:
    image: notification-service:latest
    container_name: notification-service
    restart: always
    depends_on:
      mysql-notification-db:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-notification-db:3306/notification_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

volumes:
  notification_db_data:

networks:
  restaurant-network:
    driver: bridge
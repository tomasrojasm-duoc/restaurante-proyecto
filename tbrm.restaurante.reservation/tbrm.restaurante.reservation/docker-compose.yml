services:
  mysql-reservation-db:
    image: mysql:8.0
    container_name: mysql-reservation-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reservation_db
    ports:
      - "3314:3306"
    volumes:
      - reservation_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - restaurant-network

  reservation-service:
    image: reservation-service:latest
    container_name: reservation-service
    restart: always
    depends_on:
      mysql-reservation-db:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reservation-db:3306/reservation_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

volumes:
  reservation_db_data:

networks:
  restaurant-network:
    driver: bridge
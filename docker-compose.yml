    volumes:
      - inventory_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - restaurant-network

  mysql-notification-db:
    image: mysql:8.0
    container_name: mysql-notification-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notification_db
    ports:
      - "3313:3306"
    volumes:
      - notification_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - restaurant-network

  diner-service:
    build:
      context: ./tbrm.restaurante.diner/tbrm.restaurante.diner
    image: diner-service:latest
    container_name: diner-service
    restart: always
    depends_on:
      mysql-diner-db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-diner-db:3306/diner_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

  reservation-service:
    build:
      context: ./tbrm.restaurante.reservation/tbrm.restaurante.reservation
    image: reservation-service:latest
    container_name: reservation-service
    restart: always
    depends_on:
      mysql-reservation-db:
        condition: service_healthy
      diner-service:
        condition: service_started
      table-service:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reservation-db:3306/reservation_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

  table-service:
    build:
      context: ./tbrm.restaurante.table
    image: table-service:latest
    container_name: table-service
    restart: always
    depends_on:
      mysql-table-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-table-db:3306/table_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - restaurant-network

  auth-service:
